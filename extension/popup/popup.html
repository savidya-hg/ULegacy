<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ULegacy</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header with role selector -->
        <div class="header">
            <h2>ULegacy</h2>
            <div class="role-selector">
                <select id="roleSelect">
                    <option value="owner">Owner</option>
                    <option value="beneficiary">Beneficiary</option>
                </select>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <span id="statusBadge" class="badge badge-active">● Active</span>
            <span id="lastCheck" class="last-check">Last check: never</span>
        </div>

        <!-- Owner Dashboard -->
        <div id="ownerDashboard" class="dashboard">
            <div class="section">
                <h3>Your Accounts</h3>
                <div id="accountList"></div>
                <button id="addAccountBtn" class="btn btn-secondary">+ Add Account</button>
                <div id="addAccountForm" class="hidden">
                    <select id="platformSelect">
                        <option value="facebook">Facebook</option>
                        <option value="google">Google</option>
                        <option value="instagram">Instagram</option>
                    </select>
                    <input type="text" id="usernameInput" placeholder="Username/Email">
                    <input type="password" id="passwordInput" placeholder="Password">
                    <button id="saveAccountBtn" class="btn btn-primary">Save</button>
                    <button id="cancelAddBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </div>

            <div class="section">
                <h3>Beneficiary</h3>
                <input type="email" id="beneficiaryEmail" placeholder="beneficiary@email.com">
                <button id="saveBeneficiaryBtn" class="btn btn-primary">Save</button>
            </div>

            <div class="section">
                <h3>Recovery Key</h3>
                <div class="key-row">
                    <span id="recoveryKeyDisplay">Not set</span>
                    <button id="copyKeyBtn" class="btn btn-icon" title="Copy key"><ion-icon name="copy-outline"></ion-icon></button>
                </div>
                <button id="generateKeyBtn" class="btn btn-secondary">Generate New Key</button>
            </div>

            <div class="section">
                <button id="resetTimerBtn" class="btn btn-danger">Reset Timer</button>
                <p id="statusMessage"></p>
            </div>
        </div>

        <!-- Beneficiary Dashboard -->
        <div id="beneficiaryDashboard" class="dashboard hidden">
            <div class="section">
                <h3>Settlement Portal</h3>
                <p>Enter the recovery key provided by the owner:</p>
                <input type="password" id="beneficiaryKeyInput" placeholder="Recovery Key">
                <button id="beneficiaryVerifyBtn" class="btn btn-primary">Verify & Load</button>
                <div id="settlementAccounts" class="settlement-list"></div>
            </div>
        </div>
    </div>
    <script type="module" src="popup.js"></script>
</body>
</html>
